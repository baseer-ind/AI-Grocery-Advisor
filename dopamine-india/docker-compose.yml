services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DOPAMINE_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/dopamine_india
      DOPAMINE_REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dopamine_india
    ports:
      - "5433:5432"
    volumes:
      - dopamine_db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  dopamine_db_data:
